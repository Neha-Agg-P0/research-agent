<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FA Research Agent</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:       #0057FF;
      --blue-light: #EEF3FF;
      --bg:         #F4F5F7;
      --surface:    #ffffff;
      --border:     #E4E6EA;
      --text:       #111827;
      --muted:      #6B7280;
      --pos:        #15803d; --pos-bg: #f0fdf4;
      --neg:        #b91c1c; --neg-bg: #fef2f2;
      --neu-bg:     #f9fafb;
      --mix:        #c2410c; --mix-bg: #fff7ed;
      --radius:     10px;

      --c-industry:   #7c3aed;
      --c-technology: #0369a1;
      --c-talent:     #b45309;
      --c-growth:     #15803d;
    }

    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
           background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── Header ── */
    header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 24px; display: flex; align-items: center; gap: 14px;
      height: 54px; position: sticky; top: 0; z-index: 10;
    }
    .logo {
      width: 30px; height: 30px; background: var(--blue); border-radius: 7px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .logo svg { fill: white; width: 16px; height: 16px; }
    .header-text h1 { font-size: 15px; font-weight: 700; }
    .header-text span { font-size: 11px; color: var(--muted); }

    /* ── Controls ── */
    .controls { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 24px; }
    .controls-inner { max-width: 1100px; margin: 0 auto; display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }

    .field { display: flex; flex-direction: column; gap: 5px; }
    .field-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }

    .query-field { flex: 1 1 300px; }
    input[type="text"] {
      height: 38px; border: 1.5px solid var(--border); border-radius: 6px;
      padding: 0 12px; font-size: 14px; background: var(--bg); outline: none;
      transition: border-color .15s; width: 100%;
    }
    input[type="text"]:focus { border-color: var(--blue); background: #fff; }

    .theme-toggles { display: flex; gap: 7px; flex-wrap: wrap; }
    .theme-toggle {
      display: flex; align-items: center; gap: 5px; padding: 6px 11px;
      border-radius: 20px; cursor: pointer; border: 1.5px solid var(--border);
      background: var(--bg); font-size: 12px; font-weight: 600; color: var(--muted);
      transition: all .15s; user-select: none;
    }
    .theme-toggle input { display: none; }
    .theme-toggle[data-theme="industry"]   { --tc: var(--c-industry); }
    .theme-toggle[data-theme="technology"] { --tc: var(--c-technology); }
    .theme-toggle[data-theme="talent"]     { --tc: var(--c-talent); }
    .theme-toggle[data-theme="growth"]     { --tc: var(--c-growth); }
    .theme-toggle.checked {
      color: var(--tc); border-color: var(--tc);
      background: color-mix(in srgb, var(--tc) 8%, white);
    }
    .toggle-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; opacity: 0; }
    .theme-toggle.checked .toggle-dot { opacity: 1; }

    #run-btn {
      height: 38px; padding: 0 20px; background: var(--blue); color: white;
      border: none; border-radius: 6px; font-size: 14px; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; gap: 7px;
      transition: background .15s; flex-shrink: 0; align-self: flex-end;
    }
    #run-btn:hover:not(:disabled) { background: #0046d5; }
    #run-btn:disabled { background: #9ca3af; cursor: not-allowed; }
    .spinner { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.35);
               border-top-color: white; border-radius: 50%;
               animation: spin .6s linear infinite; display: none; }
    #run-btn.loading .spinner { display: block; }
    #run-btn.loading .btn-text { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Main ── */
    main { max-width: 1100px; margin: 28px auto; padding: 0 24px 80px; }

    .state-box {
      background: var(--surface); border-radius: var(--radius);
      border: 1px solid var(--border); padding: 60px 24px;
      text-align: center; color: var(--muted);
    }
    .state-box .icon { font-size: 36px; margin-bottom: 12px; }
    .state-box h3 { font-size: 16px; color: var(--text); margin-bottom: 6px; }
    .state-box p  { font-size: 14px; }

    .progress-steps { display: flex; flex-direction: column; gap: 10px;
                      margin: 20px auto 0; max-width: 340px; text-align: left; }
    .step { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--muted); }
    .step.active { color: var(--blue); font-weight: 600; }
    .step.done   { color: var(--pos); }
    .step-dot    { width: 8px; height: 8px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
    .step.active .step-dot { animation: pulse 1s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }

    /* ── Results ── */
    .results-grid { display: flex; flex-direction: column; gap: 18px; }

    /* Overview bar */
    .overview {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px 18px;
      display: flex; gap: 24px; flex-wrap: wrap; align-items: center;
    }
    .stat { display: flex; flex-direction: column; gap: 2px; }
    .stat-val { font-size: 20px; font-weight: 800; line-height: 1; }
    .stat-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; }
    .vdiv { width: 1px; background: var(--border); height: 30px; }

    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 700;
    }
    .badge.positive { background: var(--pos-bg); color: var(--pos); }
    .badge.negative { background: var(--neg-bg); color: var(--neg); }
    .badge.neutral  { background: var(--neu-bg); color: #555; }
    .badge.mixed    { background: var(--mix-bg); color: var(--mix); }

    /* ── Direct Answer ── */
    .answer-card {
      background: var(--surface); border: 1.5px solid var(--blue);
      border-radius: var(--radius); overflow: hidden;
    }
    .answer-header {
      background: var(--blue); padding: 11px 18px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .answer-header h2 { font-size: 13px; font-weight: 700; color: white; }
    .answer-header span { font-size: 11px; color: rgba(255,255,255,.7); }
    .answer-body { padding: 16px 18px; }
    .answer-list { list-style: none; display: flex; flex-direction: column; gap: 14px; }
    .answer-item { display: flex; gap: 12px; align-items: flex-start; }
    .answer-num {
      width: 22px; height: 22px; background: var(--blue-light); color: var(--blue);
      border-radius: 50%; font-size: 11px; font-weight: 800; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; margin-top: 1px;
    }
    .answer-content { flex: 1; }
    .answer-claim { font-size: 14px; font-weight: 500; line-height: 1.55; color: var(--text); }
    .citations { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
    .cite {
      display: inline-flex; align-items: center;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 4px; padding: 1px 7px; font-size: 11px;
      font-weight: 600; color: var(--muted); cursor: pointer;
      text-decoration: none; transition: all .12s;
    }
    .cite:hover { background: var(--blue-light); color: var(--blue); border-color: var(--blue); }

    /* Section label */
    .section-label { font-size: 11px; font-weight: 700; text-transform: uppercase;
                     letter-spacing: .6px; color: var(--muted); margin-bottom: 10px; }

    /* Theme analysis — compact 2-col grid */
    .themes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 10px; }
    .theme-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 13px 15px;
    }
    .theme-card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .theme-pill {
      font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px;
      padding: 3px 8px; border-radius: 10px;
    }
    .theme-pill.industry   { background: #ede9fe; color: var(--c-industry); }
    .theme-pill.technology { background: #e0f2fe; color: var(--c-technology); }
    .theme-pill.talent     { background: #fef3c7; color: var(--c-talent); }
    .theme-pill.growth     { background: #dcfce7; color: var(--c-growth); }
    .theme-headline { font-size: 13px; font-weight: 600; line-height: 1.4; margin-bottom: 8px; }
    .theme-bullets { list-style: none; display: flex; flex-direction: column; gap: 5px; }
    .theme-bullets li { font-size: 12px; color: #374151; line-height: 1.5;
                        display: flex; gap: 6px; }
    .theme-bullets li::before { content: "·"; color: var(--muted); flex-shrink: 0; font-size: 14px; }

    /* Companies */
    .companies-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 9px; }
    .company-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 11px 13px; display: flex; flex-direction: column; gap: 5px;
    }
    .company-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 6px; }
    .company-name { font-size: 13px; font-weight: 700; }
    .co-type { font-size: 10px; color: var(--muted); background: var(--bg);
               padding: 2px 6px; border-radius: 5px; white-space: nowrap; }
    .co-cat  { font-size: 11px; color: var(--blue); font-weight: 600; }
    .co-ctx  { font-size: 12px; color: #4b5563; line-height: 1.5; }

    /* Benchmarks */
    .benchmarks { display: flex; flex-direction: column; gap: 8px; }
    .bmark {
      background: #fffbeb; border: 1px solid #fde68a;
      border-radius: 8px; padding: 11px 13px; display: flex; flex-direction: column; gap: 3px;
    }
    .bmark-src  { font-size: 10px; font-weight: 700; color: #92400e; text-transform: uppercase; letter-spacing: .4px; }
    .bmark-stat { font-size: 14px; font-weight: 600; }
    .bmark-sig  { font-size: 12px; color: #78716c; }

    /* Hiring signal */
    .hiring-row { display: flex; gap: 16px; align-items: flex-start; flex-wrap: wrap; }
    .hiring-trend { display: flex; flex-direction: column; align-items: center; gap: 3px; min-width: 70px; }
    .trend-icon  { font-size: 26px; }
    .trend-lbl   { font-size: 11px; font-weight: 700; text-transform: uppercase; }
    .trend-lbl.growing     { color: var(--pos); }
    .trend-lbl.contracting { color: var(--neg); }
    .trend-lbl.stable      { color: var(--muted); }
    .trend-lbl.unknown     { color: var(--muted); }
    .hiring-notes  { font-size: 13px; color: #374151; line-height: 1.6; margin-bottom: 7px; }
    .hot-roles { display: flex; flex-wrap: wrap; gap: 5px; }
    .role-tag  { background: #f0fdf4; color: var(--pos); border: 1px solid #bbf7d0;
                 border-radius: 4px; padding: 2px 8px; font-size: 11px; font-weight: 600; }

    /* Top articles */
    .articles-list { display: flex; flex-direction: column; gap: 7px; }
    .article-row {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 11px 14px; display: flex; gap: 11px;
    }
    .art-num  { font-size: 11px; font-weight: 700; color: var(--muted); min-width: 18px; padding-top: 2px; }
    .art-body { flex: 1; min-width: 0; }
    .art-title {
      font-size: 13px; font-weight: 600; line-height: 1.4; margin-bottom: 4px;
    }
    .art-title a { color: var(--text); text-decoration: none; }
    .art-title a:hover { color: var(--blue); text-decoration: underline; }
    .art-meta { font-size: 11px; color: var(--muted); display: flex; gap: 8px;
                flex-wrap: wrap; margin-bottom: 4px; align-items: center; }
    .art-why  { font-size: 12px; color: #4b5563; line-height: 1.5; }

    /* Source health */
    .health-toggle { font-size: 12px; color: var(--muted); cursor: pointer; display: inline-flex;
                     align-items: center; gap: 5px; user-select: none; }
    .health-toggle:hover { color: var(--text); }
    .health-rows { margin-top: 8px; display: none; flex-direction: column; gap: 4px; }
    .health-rows.open { display: flex; }
    .health-row { font-size: 11px; display: flex; gap: 8px; padding: 4px 8px;
                  background: var(--bg); border-radius: 4px; }
    .h-source { font-weight: 600; min-width: 130px; }
    .h-err    { color: var(--neg); }
    .h-msg    { color: var(--muted); }

    /* Card shell */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .card-hdr { padding: 11px 16px; border-bottom: 1px solid var(--border);
                display: flex; align-items: center; gap: 8px; }
    .card-hdr h2 { font-size: 13px; font-weight: 700; }
    .card-body { padding: 14px 16px; }
    .chip { font-size: 10px; background: #f0f0f0; color: var(--muted);
            padding: 2px 7px; border-radius: 10px; font-weight: 600; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <svg viewBox="0 0 24 24"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
  </div>
  <div class="header-text">
    <h1>FA Research Agent</h1>
    <span>Financial Advisory Industry Intelligence · powered by Claude</span>
  </div>
</header>

<div class="controls">
  <div class="controls-inner">
    <div class="field query-field">
      <label class="field-label">Research query</label>
      <input type="text" id="query-input"
        placeholder="e.g. key KPIs for advisor growth, Zocks AI, RIA consolidation trends…" />
    </div>

    <div class="field">
      <label class="field-label">Themes</label>
      <div class="theme-toggles">
        <label class="theme-toggle checked" data-theme="industry">
          <input type="checkbox" value="industry" checked><span class="toggle-dot"></span>Industry &amp; Firms
        </label>
        <label class="theme-toggle checked" data-theme="technology">
          <input type="checkbox" value="technology" checked><span class="toggle-dot"></span>Advisor Technology
        </label>
        <label class="theme-toggle checked" data-theme="talent">
          <input type="checkbox" value="talent" checked><span class="toggle-dot"></span>Talent &amp; Hiring
        </label>
        <label class="theme-toggle checked" data-theme="growth">
          <input type="checkbox" value="growth" checked><span class="toggle-dot"></span>Growth &amp; Programs
        </label>
      </div>
    </div>

    <button id="run-btn">
      <div class="spinner"></div>
      <span class="btn-text">Analyze</span>
    </button>
  </div>
</div>

<main id="main-content">
  <div class="state-box">
    <div class="icon">📊</div>
    <h3>Enter a query to get started</h3>
    <p>Ask about a company, trend, KPI, technology, or any FA industry topic.</p>
  </div>
</main>

<script>
const queryInput  = document.getElementById('query-input');
const runBtn      = document.getElementById('run-btn');
const mainContent = document.getElementById('main-content');
let loading = false;

// Theme toggles
document.querySelectorAll('.theme-toggle').forEach(lbl => {
  lbl.addEventListener('click', () => {
    const cb = lbl.querySelector('input');
    cb.checked = !cb.checked;
    lbl.classList.toggle('checked', cb.checked);
  });
});
const activeThemes = () =>
  [...document.querySelectorAll('.theme-toggle input:checked')].map(c => c.value);

// Research
runBtn.addEventListener('click', run);
queryInput.addEventListener('keydown', e => { if (e.key === 'Enter') run(); });

async function run() {
  const query = queryInput.value.trim();
  if (!query) { queryInput.focus(); return; }
  const themes = activeThemes();
  if (!themes.length) { alert('Select at least one theme.'); return; }
  if (loading) return;
  loading = true;
  runBtn.disabled = true;
  runBtn.classList.add('loading');
  showLoading();

  try {
    const resp = await fetch('/api/research', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query, themes }),
    });
    if (!resp.ok) {
      const e = await resp.json().catch(() => ({ detail: 'Request failed' }));
      showError(e.detail || 'Unknown error'); return;
    }
    const reader = resp.body.getReader();
    const dec = new TextDecoder();
    let buf = '';
    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const lines = buf.split('\n'); buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const evt = JSON.parse(line.slice(6));
          if      (evt.type === 'progress') setStep(evt.step, evt.message);
          else if (evt.type === 'results')  render(evt.articles, evt.analysis, evt.failed_sources || []);
          else if (evt.type === 'error')    showError(evt.message);
        } catch {}
      }
    }
  } catch (e) { showError('Network error: ' + e.message); }
  finally {
    loading = false; runBtn.disabled = false; runBtn.classList.remove('loading');
  }
}

function showLoading() {
  mainContent.innerHTML = `
    <div class="state-box">
      <div class="icon">⏳</div><h3>Researching…</h3>
      <div class="progress-steps">
        <div class="step active" id="s1"><div class="step-dot"></div><span>Searching across sources</span></div>
        <div class="step"        id="s2"><div class="step-dot"></div><span>Analyzing with Claude</span></div>
      </div>
    </div>`;
}
function setStep(n, msg) {
  const s1 = document.getElementById('s1'), s2 = document.getElementById('s2');
  if (!s1) return;
  if (n === 1) s1.querySelector('span').textContent = msg;
  if (n === 2) { s1.classList.replace('active','done'); s2.classList.add('active'); s2.querySelector('span').textContent = msg; }
}
function showError(msg) {
  mainContent.innerHTML = `<div class="state-box"><div class="icon">⚠️</div><h3>Something went wrong</h3><p>${x(msg)}</p></div>`;
}

// ── Render ────────────────────────────────────────────────────────────────────
const TLABEL = { industry:'Industry & Firms', technology:'Advisor Technology', talent:'Talent & Hiring', growth:'Growth & Programs' };
const TICON  = { industry:'🏛', technology:'💡', talent:'👥', growth:'📈' };
const TRENDICON = { growing:'📈', stable:'➡️', contracting:'📉', unknown:'❓' };

function render(articles, a, failed) {
  const score   = a.sentiment_score ?? 0;
  const pct     = Math.round(Math.abs(score) * 100);
  const nsrc    = new Set(articles.map(r => r.source)).size;

  // Build article URL lookup (1-indexed)
  const artByIdx = {};
  articles.forEach((ar, i) => { artByIdx[i + 1] = ar; });

  mainContent.innerHTML = `<div class="results-grid">

    <!-- Overview -->
    <div class="overview">
      <div class="stat"><span class="stat-val">${articles.length}</span><span class="stat-lbl">Articles</span></div>
      <div class="vdiv"></div>
      <div class="stat"><span class="stat-val">${nsrc}</span><span class="stat-lbl">Sources</span></div>
      <div class="vdiv"></div>
      <div class="stat">
        <span class="badge ${a.overall_sentiment}">${sEmoji(a.overall_sentiment)} ${a.overall_sentiment}</span>
        <span class="stat-lbl">Sentiment · ${score >= 0 ? '+' : ''}${pct}%</span>
      </div>
      ${failed.length ? `<div class="vdiv"></div>
      <div class="stat"><span class="stat-val" style="color:var(--neg)">${failed.length}</span><span class="stat-lbl">Sources failed</span></div>` : ''}
    </div>

    <!-- Direct Answer -->
    ${a.direct_answer?.length ? `
    <div class="answer-card">
      <div class="answer-header">
        <h2>Direct Answer</h2>
        <span>Based on ${articles.length} articles · ${nsrc} sources</span>
      </div>
      <div class="answer-body">
        <ol class="answer-list">
          ${a.direct_answer.map((item, i) => `
          <li class="answer-item">
            <span class="answer-num">${i + 1}</span>
            <div class="answer-content">
              <p class="answer-claim">${x(item.claim)}</p>
              ${item.evidence_indices?.length ? `
              <div class="citations">
                ${item.evidence_indices.map(idx => {
                  const art = artByIdx[idx];
                  return art
                    ? `<a class="cite" href="${x(art.url)}" target="_blank" rel="noopener" title="${x(art.title)}">[${idx}] ${x(art.source)}</a>`
                    : `<span class="cite">[${idx}]</span>`;
                }).join('')}
              </div>` : ''}
            </div>
          </li>`).join('')}
        </ol>
      </div>
    </div>` : ''}

    <!-- Theme analysis -->
    ${a.theme_analysis?.length ? `
    <div>
      <p class="section-label">Evidence by Theme</p>
      <div class="themes-grid">
        ${a.theme_analysis.map(t => `
        <div class="theme-card">
          <div class="theme-card-top">
            <span class="theme-pill ${t.theme}">${TICON[t.theme] || ''} ${TLABEL[t.theme] || t.theme}</span>
            <span class="badge ${t.sentiment}" style="font-size:10px">${sEmoji(t.sentiment)}</span>
          </div>
          <p class="theme-headline">${x(t.headline)}</p>
          <ul class="theme-bullets">
            ${(t.insights || []).map(ins => `<li>${x(ins)}</li>`).join('')}
          </ul>
        </div>`).join('')}
      </div>
    </div>` : ''}

    <!-- Companies & Products -->
    ${a.companies_and_products?.length ? `
    <div>
      <p class="section-label">Companies &amp; Products (${a.companies_and_products.length})</p>
      <div class="companies-grid">
        ${a.companies_and_products.map(c => `
        <div class="company-card">
          <div class="company-top">
            <span class="company-name">${x(c.name)}</span>
            <span class="co-type">${x(c.type)}</span>
          </div>
          ${c.product_category ? `<span class="co-cat">${x(c.product_category)}</span>` : ''}
          <p class="co-ctx">${x(c.context)}</p>
          <span class="badge ${c.sentiment}" style="align-self:flex-start;font-size:10px">${sEmoji(c.sentiment)} ${c.sentiment}</span>
        </div>`).join('')}
      </div>
    </div>` : ''}

    <!-- Benchmark data -->
    ${a.benchmark_data?.length ? `
    <div>
      <p class="section-label">Benchmark &amp; Research Data</p>
      <div class="benchmarks">
        ${a.benchmark_data.map(b => `
        <div class="bmark">
          <span class="bmark-src">${x(b.source)}</span>
          <span class="bmark-stat">${x(b.stat)}</span>
          <span class="bmark-sig">${x(b.significance)}</span>
        </div>`).join('')}
      </div>
    </div>` : ''}

    <!-- Hiring signal -->
    ${a.hiring_signal ? `
    <div class="card">
      <div class="card-hdr"><h2>Hiring Signal</h2></div>
      <div class="card-body">
        <div class="hiring-row">
          <div class="hiring-trend">
            <span class="trend-icon">${TRENDICON[a.hiring_signal.trend] || '❓'}</span>
            <span class="trend-lbl ${a.hiring_signal.trend}">${a.hiring_signal.trend}</span>
          </div>
          <div style="flex:1">
            <p class="hiring-notes">${x(a.hiring_signal.notes)}</p>
            ${a.hiring_signal.hot_roles?.length ? `
            <div class="hot-roles">
              ${a.hiring_signal.hot_roles.map(r => `<span class="role-tag">${x(r)}</span>`).join('')}
            </div>` : ''}
          </div>
        </div>
      </div>
    </div>` : ''}

    <!-- Top articles -->
    ${a.top_articles?.length ? `
    <div>
      <p class="section-label">Source Articles</p>
      <div class="articles-list">
        ${a.top_articles.map((ar, i) => {
          const src = artByIdx[ar.article_index] || {};
          return `
          <div class="article-row">
            <span class="art-num">${i + 1}</span>
            <div class="art-body">
              <div class="art-title">
                ${src.url
                  ? `<a href="${x(src.url)}" target="_blank" rel="noopener">${x(ar.title)} ↗</a>`
                  : x(ar.title)}
              </div>
              <div class="art-meta">
                <span>${x(ar.source)}</span>
                <span class="theme-pill ${ar.theme}" style="font-size:10px;padding:1px 6px">${TLABEL[ar.theme] || ar.theme}</span>
                ${src.published ? `<span>${fmtDate(src.published)}</span>` : ''}
              </div>
              <p class="art-why">${x(ar.why_it_matters)}</p>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>` : ''}

    <!-- Source health -->
    ${failed.length ? `
    <div>
      <span class="health-toggle" onclick="this.nextElementSibling.classList.toggle('open')">
        ⚠ ${failed.length} source${failed.length > 1 ? 's' : ''} unavailable ▾
      </span>
      <div class="health-rows">
        ${failed.map(f => `
        <div class="health-row">
          <span class="h-source">${x(f.source)}</span>
          <span class="h-err">${x(f.error)}</span>
          <span class="h-msg">${x(f.msg)}</span>
        </div>`).join('')}
      </div>
    </div>` : ''}

  </div>`;
}

// Helpers
function x(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function sEmoji(s) { return {positive:'😊',negative:'😞',neutral:'😐',mixed:'🤔'}[s]||'😐'; }
function fmtDate(d) {
  if (!d) return '';
  try { return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
  catch { return d.slice(0,16); }
}
</script>
</body>
</html>
